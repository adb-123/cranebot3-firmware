server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: nf_robot_logs
    static_configs:
      - targets: ["localhost"]
        labels:
          app: nf_robot
          service: stringman-headless
          __path__: /var/log/nf_robot/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            trace_id: trace_id
            span_id: span_id
      - labels:
          level:
          logger:
      - template:
          source: trace_id
          template: '{{ .Value }}'
      - labeldrop:
          - span_id

  - job_name: nf_robot_plain_logs
    static_configs:
      - targets: ["localhost"]
        labels:
          app: nf_robot
          service: stringman-headless
          __path__: /var/log/nf_robot/*.log
