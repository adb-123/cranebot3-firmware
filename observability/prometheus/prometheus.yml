global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          app: grafana

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
        labels:
          app: loki

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          app: tempo

  - job_name: promtail
    static_configs:
      - targets: ["promtail:9080"]
        labels:
          app: promtail

  - job_name: stringman-headless
    static_configs:
      - targets: ["host.docker.internal:9464"]
        labels:
          app: stringman-headless

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          app: otel-collector
