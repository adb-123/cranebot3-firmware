name: nf-robot-observability

services:
  grafana:
    image: grafana/grafana-oss:11.5.2
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_METRICS_ENABLED: "true"
      GF_USERS_DEFAULT_THEME: "dark"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:3.4.2
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./loki/loki.yml:/etc/loki/loki.yml:ro

  promtail:
    image: grafana/promtail:3.4.2
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ../logs:/var/log/nf_robot:ro
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.7.1
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "3200:3200"
    volumes:
      - tempo-data:/var/tempo
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otelcol/config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      - ./otel-collector/config.yml:/etc/otelcol/config.yml:ro
    depends_on:
      - tempo

volumes:
  grafana-data:
  prometheus-data:
  loki-data:
  tempo-data:
